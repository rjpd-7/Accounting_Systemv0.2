<!-- Student Task Component -->
<div class="messaging-container">
    <div class="messaging-header">
        <h5 class="mb-0">
            <i class="bi bi-list-check"></i> Assigned Tasks
        </h5>
    </div>

    <br>

    <div class="messaging-body">
        <div class="row g-2 mb-3">
            <div class="col-md-7">
                <input type="text" class="form-control" id="student_task_search" placeholder="Search tasks by teacher, title, or instructions...">
            </div>
            <div class="col-md-3">
                <input type="date" class="form-control" id="student_task_deadline_filter" title="Filter by deadline date">
            </div>
            <div class="col-md-1 d-flex align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="student_task_overdue_only">
                    <label class="form-check-label small" for="student_task_overdue_only">Overdue</label>
                </div>
            </div>
            <div class="col-md-1 d-grid">
                <button type="button" class="btn btn-outline-secondary" id="student_task_filter_clear" title="Clear filters">
                    Clear <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
        <div class="messages-list" id="student-task-received-list">
            <div class="text-center text-muted p-4">
                <p>Loading assigned tasks...</p>
            </div>
        </div>
    </div>
</div>

<!-- Student Task Detail Modal -->
<div class="modal fade" id="studentTaskDetailModal" tabindex="-1" aria-labelledby="studentTaskDetailLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="studentTaskDetailLabel">Task Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="student-task-detail-content"></div>
                <div id="student-task-submission-section" class="mt-4 pt-3 border-top">
                    <h6 class="mb-3">My Submission</h6>
                    <div id="student-task-submission-status" class="small text-muted mb-3"></div>
                    <form id="studentTaskSubmissionForm">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="student_task_submission_comment" class="form-label">Comment (Optional)</label>
                            <textarea class="form-control" id="student_task_submission_comment" rows="3" placeholder="Add a note for your teacher..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="student_task_submission_files" class="form-label">Upload Files</label>
                            <input type="file" class="form-control" id="student_task_submission_files" multiple>
                            <small class="text-muted">Attach your completed files before turning in.</small>
                            <div id="student-task-submission-file-list" class="mt-2"></div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-success" id="student_task_turn_in_btn">Turn In Work</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    window.studentTaskApiUrls = {
        getTasks: '{% url "AccountingSystem:get_tasks" %}',
        submitTask: '{% url "AccountingSystem:submit_task" task_id=0 %}',
        unsubmitTask: '{% url "AccountingSystem:unsubmit_task" task_id=0 %}'
    };
</script>
