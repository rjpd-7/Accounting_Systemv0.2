<!-- Student Task Component -->
<div class="messaging-container">
    <div class="messaging-header">
        <h5 class="mb-0">
            <i class="bi bi-list-check"></i> Assigned Tasks
        </h5>
    </div>

    <br>

    <div class="messaging-body">
        <div class="row g-2 mb-3">
            <div class="col-md-7">
                <input type="text" class="form-control" id="student_task_search" placeholder="Search tasks by teacher, title, or instructions...">
            </div>
            <div class="col-md-4">
                <input type="date" class="form-control" id="student_task_deadline_filter" title="Filter by deadline date">
            </div>
            <div class="col-md-1 d-grid">
                <button type="button" class="btn btn-outline-secondary" id="student_task_filter_clear" title="Clear filters">
                    Clear <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
        <div class="messages-list" id="student-task-received-list">
            <div class="text-center text-muted p-4">
                <p>Loading assigned tasks...</p>
            </div>
        </div>
    </div>
</div>

<!-- Student Task Detail Modal -->
<div class="modal fade" id="studentTaskDetailModal" tabindex="-1" aria-labelledby="studentTaskDetailLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="studentTaskDetailLabel">Task Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="student-task-detail-content"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    window.studentTaskApiUrls = {
        getTasks: '{% url "AccountingSystem:get_tasks" %}'
    };
</script>
